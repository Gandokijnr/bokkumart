[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = ".netlify/functions-internal"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
  force = true
