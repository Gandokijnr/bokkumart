<!doctype html>
<html {{ HTML_ATTRS }}>
  <head {{ HEAD_ATTRS }}>
    {{ HEAD }}
    <style>
      :root {
        --ha-red: #ed1c24;
      }
      html,
      body {
        background: #fff;
      }
      .ha-splash {
        position: fixed;
        inset: 0;
        z-index: 100000;
        background: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .ha-splash__inner {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .ha-splash__brand {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--ha-red);
        animation: haPulse 1.2s ease-in-out infinite;
      }
      .ha-splash__icon {
        width: 24px;
        height: 24px;
      }
      .ha-splash__text {
        font-weight: 800;
        letter-spacing: 0.2px;
        font-size: 20px;
      }
      @keyframes haPulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.6;
          transform: scale(0.985);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .ha-splash__brand {
          animation: none;
        }
      }
    </style>
  </head>
  <body {{ BODY_ATTRS }}>
    <div id="__ha-splash" class="ha-splash">
      <div class="ha-splash__inner">
        <div class="ha-splash__brand">
          <svg
            class="ha-splash__icon"
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <circle cx="8" cy="21" r="1" />
            <circle cx="19" cy="21" r="1" />
            <path
              d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.72a2 2 0 0 0 2-1.5l1.38-6.55H6.12"
            />
          </svg>
          <div class="ha-splash__text">Home Affairs</div>
        </div>
      </div>
    </div>

    {{ APP }}
  </body>
</html>
