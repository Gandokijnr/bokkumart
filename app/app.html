<!doctype html>
<html {{ HTML_ATTRS }}>
  <head {{ HEAD_ATTRS }}>
    {{ HEAD }}
    <style>
      :root {
        --bokku-blue: #0052cc;
      }
      html,
      body {
        background: #fff;
      }
      .bokku-splash {
        position: fixed;
        inset: 0;
        z-index: 100000;
        background: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .bokku-splash__inner {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .bokku-splash__brand {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--bokku-blue);
        animation: bokkuPulse 1.2s ease-in-out infinite;
      }
      .bokku-splash__icon {
        width: 28px;
        height: 28px;
      }
      .bokku-splash__text {
        font-weight: 800;
        letter-spacing: -0.5px;
        font-size: 22px;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
      }
      @keyframes bokkuPulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.7;
          transform: scale(0.985);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .bokku-splash__brand {
          animation: none;
        }
      }
    </style>
  </head>
  <body {{ BODY_ATTRS }}>
    <div id="__bokku-splash" class="bokku-splash">
      <div class="bokku-splash__inner">
        <div class="bokku-splash__brand">
          <svg
            class="bokku-splash__icon"
            xmlns="http://www.w3.org/2000/svg"
            width="28"
            height="28"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
          </svg>
          <div class="bokku-splash__text">BokkuXpress</div>
        </div>
      </div>
    </div>

    {{ APP }}
  </body>
</html>
